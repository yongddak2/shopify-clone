# 이 파일을 application.yml로 복사한 후 아래 값을 본인 키로 교체하세요
# cp application-example.yml application.yml

spring:
  application:
    name: pantrka-backend

  # ─── PostgreSQL ──────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/shopdb
    username: shop
    password: shop1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
    open-in-view: false

  # ─── Redis ───────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: redis1234

  # ─── Kafka ───────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shop-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ─── Elasticsearch ───────────────────────────────
  elasticsearch:
    uris: http://localhost:9200

  # ─── File Upload ─────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# ─── Server ──────────────────────────────────────
server:
  port: 8080

# ─── JWT ─────────────────────────────────────────
jwt:
  secret: your_jwt_secret_key_here  # TODO: 본인 키로 교체
  access-token-expiry: 1800000    # 30 min
  refresh-token-expiry: 604800000 # 7 days

# ─── OAuth (소셜 로그인) ──────────────────────────
# 각 개발자 콘솔에서 발급. Redirect URI는 http://localhost:3000/oauth/callback/{provider} 로 등록
# 카카오는 REST API 키가 client-id 역할. 프론트 .env.local 의 NEXT_PUBLIC_*_CLIENT_ID 와 client-id 값은 동일
oauth:
  kakao:
    client-id: your_kakao_rest_api_key       # TODO: 카카오 REST API 키
    client-secret: your_kakao_client_secret   # TODO: 카카오 보안 Client Secret
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  google:
    client-id: your_google_client_id          # TODO: 구글 OAuth Client ID
    client-secret: your_google_client_secret  # TODO: 구글 OAuth Client Secret
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
  naver:
    client-id: your_naver_client_id           # TODO: 네이버 Client ID
    client-secret: your_naver_client_secret   # TODO: 네이버 Client Secret
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

# ─── Toss Payments ───────────────────────────────
toss:
  payments:
    secret-key: your_toss_secret_key_here  # TODO: 본인 키로 교체
    confirm-url: https://api.tosspayments.com/v1/payments/confirm

# ─── Swagger ─────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ─── AWS S3 ──────────────────────────────────────
cloud:
  aws:
    s3:
      bucket: yong-byeong-shop-images
      region: ap-southeast-2
    credentials:
      access-key: your-access-key  # TODO: 본인 키로 교체
      secret-key: your-secret-key  # TODO: 본인 키로 교체

# ─── Logging ─────────────────────────────────────
logging:
  level:
    root: INFO
    com.pantrka.backend: DEBUG
    org.hibernate.SQL: DEBUG
