# 이 파일을 application.yml로 복사한 후 아래 값을 본인 키로 교체하세요
# cp application-example.yml application.yml

spring:
  application:
    name: shopify-backend

  # ─── PostgreSQL ──────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/shopdb
    username: shop
    password: shop1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
    open-in-view: false

  # ─── Redis ───────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: redis1234

  # ─── Kafka ───────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shop-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ─── Elasticsearch ───────────────────────────────
  elasticsearch:
    uris: http://localhost:9200

  # ─── File Upload ─────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ─── Server ──────────────────────────────────────
server:
  port: 8080

# ─── JWT ─────────────────────────────────────────
jwt:
  secret: your_jwt_secret_key_here  # TODO: 본인 키로 교체
  access-token-expiry: 1800000    # 30 min
  refresh-token-expiry: 604800000 # 7 days

# ─── Toss Payments ───────────────────────────────
toss:
  payments:
    secret-key: your_toss_secret_key_here  # TODO: 본인 키로 교체
    confirm-url: https://api.tosspayments.com/v1/payments/confirm

# ─── Swagger ─────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ─── Logging ─────────────────────────────────────
logging:
  level:
    root: INFO
    com.shopify.backend: DEBUG
    org.hibernate.SQL: DEBUG
